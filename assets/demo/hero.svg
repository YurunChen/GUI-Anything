<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GUI-Anything dual-pane Claude Code observer demo">
  <defs>
    <linearGradient id="bg" x1="120" y1="40" x2="1060" y2="650" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f7f8fb"/>
      <stop offset="0.48" stop-color="#eef3f1"/>
      <stop offset="1" stop-color="#f9f4ec"/>
    </linearGradient>
    <linearGradient id="glass" x1="120" y1="92" x2="1080" y2="590" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#f6f7f9" stop-opacity="0.88"/>
    </linearGradient>
    <filter id="shadow" x="40" y="45" width="1120" height="590" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#172033" flood-opacity="0.16"/>
    </filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
      .sans { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif; }
      .line { opacity: 0; animation: reveal 9s infinite; }
      .line2 { animation-delay: 0.8s; }
      .line3 { animation-delay: 1.6s; }
      .line4 { animation-delay: 2.4s; }
      .line5 { animation-delay: 3.2s; }
      .pulse { animation: pulse 2.6s ease-in-out infinite; transform-origin: center; }
      .flow { stroke-dasharray: 360; stroke-dashoffset: 360; animation: draw 9s ease-in-out infinite; }
      @keyframes reveal {
        0%, 7% { opacity: 0; transform: translateY(8px); }
        12%, 82% { opacity: 1; transform: translateY(0); }
        100% { opacity: 0; transform: translateY(-3px); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.72; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.04); }
      }
      @keyframes draw {
        0%, 8% { stroke-dashoffset: 360; opacity: 0.25; }
        24%, 78% { stroke-dashoffset: 0; opacity: 1; }
        100% { stroke-dashoffset: 0; opacity: 0.2; }
      }
    </style>
  </defs>

  <rect width="1200" height="675" rx="38" fill="url(#bg)"/>
  <circle cx="1010" cy="134" r="84" fill="#bfd7cd" opacity="0.36"/>
  <circle cx="184" cy="562" r="118" fill="#e6c79d" opacity="0.22"/>

  <g filter="url(#shadow)">
    <rect x="90" y="74" width="1020" height="520" rx="28" fill="url(#glass)" stroke="#ffffff" stroke-width="1.5"/>
    <rect x="90" y="74" width="1020" height="54" rx="28" fill="#f9fafb"/>
    <path d="M90 128H1110" stroke="#e6e8ec"/>
    <circle cx="124" cy="101" r="7" fill="#ff6b5f"/>
    <circle cx="148" cy="101" r="7" fill="#f7c66a"/>
    <circle cx="172" cy="101" r="7" fill="#63c174"/>
    <text x="600" y="106" text-anchor="middle" class="sans" font-size="17" font-weight="700" fill="#1f2937">ga flow</text>

    <rect x="118" y="154" width="470" height="410" rx="18" fill="#111827"/>
    <rect x="612" y="154" width="470" height="410" rx="18" fill="#fbfcfd" stroke="#e3e6eb"/>

    <text x="146" y="190" class="sans" font-size="16" font-weight="700" fill="#f8fafc">Claude Code</text>
    <text x="640" y="190" class="sans" font-size="16" font-weight="700" fill="#111827">Flow Observer</text>
    <text x="985" y="190" text-anchor="end" class="mono" font-size="12" fill="#64748b">Live · Apple System</text>

    <g class="mono" font-size="15">
      <text x="146" y="231" fill="#d1d5db">You: refactor auth layer</text>
      <text x="146" y="269" fill="#9ca3af" class="line line2">▸ Read src/auth/*.ts</text>
      <text x="146" y="303" fill="#9ca3af" class="line line3">▸ Edit middleware.ts</text>
      <text x="146" y="337" fill="#9ca3af" class="line line4">▸ Run bun test auth</text>
      <text x="146" y="371" fill="#87efac" class="line line5">✓ Tests pass</text>
      <rect x="146" y="429" width="338" height="46" rx="10" fill="#1f2937"/>
      <text x="166" y="457" fill="#e5e7eb">Claude keeps coding...</text>
    </g>

    <g>
      <rect x="640" y="217" width="390" height="70" rx="14" fill="#ffffff" stroke="#e7e9ee"/>
      <circle cx="666" cy="251" r="8" fill="#4f8f76" class="pulse"/>
      <text x="686" y="245" class="sans" font-size="14" font-weight="700" fill="#0f172a">Implement · pivot</text>
      <text x="686" y="267" class="mono" font-size="12" fill="#64748b">3 tools · summary ready · wiki C001 saved</text>

      <rect x="640" y="306" width="390" height="74" rx="14" fill="#f8fafc" stroke="#e7e9ee"/>
      <text x="666" y="334" class="sans" font-size="13" font-weight="700" fill="#0f172a">KNOWLEDGE</text>
      <text x="760" y="334" class="mono" font-size="12" fill="#4f8f76">C012 hit</text>
      <text x="666" y="358" class="mono" font-size="12" fill="#64748b">Auth middleware owns session refresh policy.</text>

      <path d="M690 438C738 398 786 398 834 438C882 478 930 478 978 438" class="flow" stroke="#4f8f76" stroke-width="4" stroke-linecap="round"/>
      <circle cx="690" cy="438" r="15" fill="#ecfdf5" stroke="#4f8f76" stroke-width="3"/>
      <circle cx="834" cy="438" r="15" fill="#fff7ed" stroke="#c49a5a" stroke-width="3"/>
      <circle cx="978" cy="438" r="15" fill="#eef2ff" stroke="#68769d" stroke-width="3"/>
      <text x="690" y="483" text-anchor="middle" class="mono" font-size="12" fill="#64748b">explore</text>
      <text x="834" y="483" text-anchor="middle" class="mono" font-size="12" fill="#64748b">implement</text>
      <text x="978" y="483" text-anchor="middle" class="mono" font-size="12" fill="#64748b">verify</text>
    </g>
  </g>

  <text x="600" y="636" text-anchor="middle" class="sans" font-size="22" font-weight="700" fill="#111827">One command. Two panes. No lost context.</text>
</svg>
